{% extends "auctions/layout.html" %}

{% block body %}

    <h2>Active Listings</h2>

    {% for item in list%}
    <div><a href="{% url 'item' item.id %}">
        <img src="{{item.img}}" width='100' height="100">
        {{item.title}}<br>
      {% if item.current_bid.bid is None%}
        {{item.start_bid}}<br>
      {% else %}
        {{item.current_bid.bid}}<br>
      {%endif%}
    </a></div>
    {% endfor %}
{% endblock %}
